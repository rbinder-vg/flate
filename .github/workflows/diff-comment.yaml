---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate Diff Comment

on:
  workflow_call:
    inputs:
      path:
        description: Path to the flate root passed as FLATE_PATH (e.g. ./kubernetes/flux/cluster)
        type: string
        required: true
      kind:
        description: flate diff kind to render. Supported by flate diff today are "helmrelease" and "kustomization". Invoke this workflow once per kind.
        type: string
        required: true
      flate-version:
        description: flate version to install via mise (e.g. "0.1.28" or "latest")
        type: string
        required: false
        default: latest
      flate-args:
        description: Extra flags appended to `flate diff <kind>` (e.g. "--allow-missing-secrets --skip-kinds Secret"). Whitespace-split; no support for quoted args.
        type: string
        required: false
        default: ""
      cache:
        description: Restore and save mise's tool installs between runs
        type: boolean
        required: false
        default: false
      runs-on:
        description: Runner label used for the diff job
        type: string
        required: false
        default: ubuntu-latest
    outputs:
      comment:
        description: |
          Rendered comment body. The first line is always the per-kind HTML marker `<!-- flate:<kind> -->` — consumers should match on that marker to find-and-upsert across runs. Empty string when there is no diff for this kind; consumers should treat empty as a signal to delete any prior comment carrying `<!-- flate:<kind> -->`.
        value: ${{ jobs.diff.outputs.comment }}

permissions:
  contents: read

jobs:
  diff:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      comment: ${{ steps.render.outputs.comment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          cache: ${{ inputs.cache }}
          tool_versions: |
            github:home-operations/flate ${{ inputs.flate-version }}

      - name: Run flate diff
        env:
          FLATE_PATH: ${{ inputs.path }}
          KIND: ${{ inputs.kind }}
          FLATE_ARGS: ${{ inputs.flate-args }}
        # FLATE_ARGS is intentionally unquoted so consumers can pass multiple flags.
        # shellcheck disable=SC2086
        run: flate diff "$KIND" $FLATE_ARGS > diff.out

      - name: Render comment body
        id: render
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          KIND: ${{ inputs.kind }}
        with:
          script: |-
            const fs = require('fs');
            const kind = process.env.KIND;
            const marker = `<!-- flate:${kind} -->`;
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            // Section title for the kinds flate diff currently supports.
            // Unknown kinds fall back to ucfirst — good enough for a CRD a user wires up themselves.
            const KIND_LABELS = { kustomization: 'Kustomization', helmrelease: 'HelmRelease' };
            const label = KIND_LABELS[kind.toLowerCase()] ?? (kind.charAt(0).toUpperCase() + kind.slice(1));

            let diff = '';
            try { diff = fs.readFileSync('diff.out', 'utf8'); } catch {}

            // Always write a Job Summary — gives consumers a non-PR-comment surface
            // (the run page itself), and Job Summaries have a much larger size budget
            // than comments, so the full untruncated diff lives here.
            const summary = core.summary.addHeading(`${label} diff`);
            if (!diff.trim()) {
              await summary.addRaw('No diff.').write();
              core.setOutput('comment', '');
              return;
            }
            await summary.addCodeBlock(diff, 'diff').write();

            // GitHub caps comment bodies at 65,536 chars. If the diff overflows, middle-truncate
            // so both ends stay visible; the full diff is always in the Job Summary / run logs.
            const LIMIT = 65000;
            const header = `${marker}\n<details open><summary>${label} diff</summary>\n\n\`\`\`diff\n`;
            const footer = `\n\`\`\`\n\n</details>\n\n<sub>Diff by [flate](https://github.com/home-operations/flate) — [Workflow run](${runUrl})</sub>`;

            let payload = diff;
            if (header.length + diff.length + footer.length > LIMIT) {
              const notice = `\n... <truncated, see [workflow run](${runUrl}) for full diff> ...\n`;
              const half = Math.floor((LIMIT - header.length - footer.length - notice.length) / 2);
              payload = diff.slice(0, half) + notice + diff.slice(diff.length - half);
            }
            core.setOutput('comment', header + payload + footer);
