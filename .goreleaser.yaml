---
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: flate

before:
  hooks:
    - go mod tidy

builds:
  - id: flate
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      # -X main.version stamps the tag into cmd/flate's `version` var
      # so `flate --version` reports the release tag instead of
      # debug.ReadBuildInfo's "(devel)" fallback.
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    main: ./cmd/flate/main.go
    binary: flate

archives:
  - id: flate
    ids:
      - flate
    format_overrides:
      - goos: windows
        formats:
          - zip

upx:
  - enabled: true
    compress: best
    lzma: true

checksum:
  algorithm: sha256
  split: true

sboms:
  - artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"

signs:
  - cmd: cosign
    signature: ${artifact}.sigstore.json
    args:
      - sign-blob
      - --bundle=${signature}
      - --yes
      - ${artifact}
    artifacts: all
    output: true

homebrew_casks:
  - name: flate
    ids:
      - flate
    binaries:
      - flate
    generate_completions_from_executable:
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
    repository:
      owner: home-operations
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/home-operations/flate
    description: Render and diff Flux GitOps repositories offline, without a cluster
    # Binaries aren't notarized — strip the quarantine bit so macOS doesn't
    # block the first run with "developer cannot be verified".
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/flate"] if OS.mac?

# release-please creates the GitHub Release with the changelog; goreleaser
# attaches binaries/sboms/sigs to it.
release:
  mode: keep-existing
