---
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: flate

before:
  hooks:
    - go mod tidy

builds:
  - id: flate
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    main: ./cmd/flate/main.go
    binary: flate

archives:
  - id: flate
    ids:
      - flate
    format_overrides:
      - goos: windows
        formats:
          - zip

upx:
  - enabled: true
    compress: best
    lzma: true

checksum:
  algorithm: sha256
  split: true

sboms:
  - artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"

signs:
  - cmd: cosign
    signature: ${artifact}.sigstore.json
    args:
      - sign-blob
      - --bundle=${signature}
      - --yes
      - ${artifact}
    artifacts: all
    output: true

brews:
  - name: flate
    repository:
      owner: home-operations
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/home-operations/flate
    description: Render and diff Flux GitOps repositories offline, without a cluster
    license: AGPL-3.0
    test: |
      system "#{bin}/flate", "--version"

# Org-enforced release immutability locks assets the moment a release is
# published, so create the release as a draft (mutable) and let the workflow
# flip it to published once all assets are uploaded.
release:
  draft: true
