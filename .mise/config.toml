[tools]
go = "1.26.4"
golangci-lint = "2.12.2"
lefthook = "2.1.9"
oxfmt = "0.55.0"
zizmor = "1.25.2"

[tasks.fmt]
description = "Run go fmt against code"
run = "go fmt ./..."

[tasks.vet]
description = "Run go vet against code"
run = "go vet ./..."

[tasks.test]
description = "Run tests with coverage"
run = "go test $(go list ./...) -coverprofile cover.out"

[tasks.bench]
description = "Run benchmark suite (use BENCH=Pattern to filter, COUNT=N to repeat)"
run = """
mkdir -p bench/results && \
go test -run=^$ -bench="${BENCH:-.}" -benchmem -count="${COUNT:-1}" -timeout=20m ./pkg/loader ./pkg/change ./pkg/manifest ./pkg/store ./pkg/kustomize ./pkg/helm ./pkg/values ./pkg/depwait ./pkg/diff ./pkg/source/git | tee "bench/results/$(date +%Y%m%dT%H%M%S)-$(git rev-parse --short HEAD)$([ -n "$(git status --porcelain)" ] && echo -dirty).txt"
"""

[tasks.bench-baseline]
description = "Refresh bench/baseline.txt by running the bench suite"
run = """
go test -run=^$ -bench=. -benchmem -count=5 -timeout=30m ./pkg/loader ./pkg/change ./pkg/manifest ./pkg/store ./pkg/kustomize ./pkg/helm ./pkg/values ./pkg/depwait ./pkg/diff ./pkg/source/git > bench/baseline.txt
"""

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.lint-fix]
description = "Run golangci-lint with --fix"
run = "golangci-lint run --fix"

[hooks]
postinstall = "lefthook install"
