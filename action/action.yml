---
# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Setup flate CLI
description: Install the flate CLI from GitHub releases and optionally cache its on-disk store between runs
author: home-operations
branding:
  color: purple
  icon: git-pull-request

inputs:
  base:
    description: |
      baseline git rev (e.g. main, origin/main, HEAD~3, SHA) — materializes the rev's tree
      to a tempdir and runs in changed-only mode.
    required: false
    default: ${{ github.event.repository.default_branch }}
  cache_dir:
    description: |
      on-disk cache root for source artifacts, helm charts, kustomize stages, and persistent render output.
    required: false
    default: ${{ runner.temp }}
  version:
    description: |
      flate version to install (e.g. "0.1.25") or "latest". When unset, the action
      installs the version matching the ref it was pinned to (e.g. @0.1.26 → 0.1.26);
      branches and SHAs fall back to "latest".
    required: false
    default: ""
  token:
    description: GitHub token used to resolve releases and avoid unauthenticated rate limits on the GitHub API
    required: false
    default: ${{ github.token }}
  cache:
    description: Restore and save flate's XDG cache (sources, helm charts, git mirrors, blobs) between runs
    required: false
    default: "false"
  bindir:
    description: Alternative install location for the flate binary; defaults to a path under $RUNNER_TOOL_CACHE
    required: false
    default: ""

outputs:
  version:
    description: Resolved flate version (without the leading "v")
    value: ${{ steps.verify.outputs.version }}
  cache-hit:
    description: Whether a previous flate cache was restored (only meaningful when cache=true)
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - id: resolve
      name: Resolve flate target
      shell: bash
      env:
        INPUT_BASE: ${{ inputs.base }}
        INPUT_CACHE_DIR: ${{ inputs.cache_dir }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_TOKEN: ${{ inputs.token }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPO: ${{ github.action_repository }}
      run:
        | # zizmor: ignore[github-env] FLATE_CACHE_DIR is the action's contract; the value is a runner-provided path joined with a literal
        set -euo pipefail

        # SemVer pattern — used both to recognize tag-style refs and to filter
        # candidate tags when a SHA-pin is mapped back to a release.
        semver='^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'

        # Resolve which flate version to install. Precedence:
        #   1. explicit `version:` input (including the literal "latest")
        #   2. action ref is a SemVer tag (@0.1.26, @v0.1.26)
        #   3. action ref is a commit SHA whose commit a SemVer tag points at
        #      (looked up via the GitHub tags API on the action's own repo —
        #       supports the SHA-pinning security pattern)
        #   4. "latest" — resolved against the releases API (with token) or the
        #      HTTP redirect on /releases/latest (without)
        version="${INPUT_VERSION}"
        from=""

        if [[ -n "${version}" ]]; then
          from="input"
        elif [[ "${ACTION_REF:-}" =~ ${semver} ]]; then
          version="${ACTION_REF#v}"
          from="action ref ${ACTION_REF}"
        elif [[ "${ACTION_REF:-}" =~ ^[0-9a-f]{7,40}$ ]] && command -v jq >/dev/null; then
          auth=()
          [[ -n "${INPUT_TOKEN}" ]] && auth=(-H "Authorization: Bearer ${INPUT_TOKEN}")
          tag=$(curl -fsSL --max-time 10 \
                -H "Accept: application/vnd.github+json" \
                "${auth[@]}" \
                "https://api.github.com/repos/${ACTION_REPO}/tags?per_page=100" 2>/dev/null \
            | jq -r --arg sha "${ACTION_REF}" --arg re "${semver}" '
                [.[] | select(.commit.sha | startswith($sha)) | .name | select(test($re))] | first // ""
              ' 2>/dev/null || true)
          if [[ -n "${tag}" ]]; then
            version="${tag#v}"
            from="action ref ${ACTION_REF} → tag ${tag}"
          fi
        fi

        # Unresolved (empty or literal "latest") → query the releases endpoint for a concrete tag.
        if [[ -z "${version}" || "${version}" == "latest" ]]; then
          if [[ -n "${INPUT_TOKEN}" ]] && command -v jq >/dev/null; then
            version=$(curl -fsSL \
                -H "Authorization: Bearer ${INPUT_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/home-operations/flate/releases/latest \
              | jq -r .tag_name)
          else
            version=$(curl -w '%{url_effective}\n' -IsSL \
              https://github.com/home-operations/flate/releases/latest \
              -o /dev/null | sed 's|^.*/||')
          fi
          from="${from:-default} (resolved \"latest\" → ${version})"
        fi
        if [[ -z "${version}" ]]; then
          echo "Unable to determine flate version"
          exit 1
        fi
        version="${version#v}"
        echo "resolved flate version: ${version} (from ${from})"

        # flate >=0.1.30 reads FLATE_CACHE_DIR (autobound from --cache-dir),
        # so we pick one writable path instead of mirroring Go's
        # os.UserCacheDir() per OS. Exporting it via GITHUB_ENV ensures
        # every subsequent `flate` invocation in the job uses it.
        echo "version=${version}" >> "${GITHUB_OUTPUT}"
        echo "FLATE_BASE=${INPUT_BASE}" >> "${GITHUB_ENV}"
        echo "FLATE_CACHE_DIR=${INPUT_CACHE_DIR}/flate" >> "${GITHUB_ENV}"

    - id: cache
      if: ${{ inputs.cache == 'true' }}
      name: Restore flate cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ env.FLATE_CACHE_DIR }}
        key: flate-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          flate-${{ runner.os }}-${{ runner.arch }}-

    - name: Download flate
      shell: bash
      env:
        VERSION: ${{ steps.resolve.outputs.version }}
        FLATE_TOOL_DIR: ${{ inputs.bindir }}
      run:
        | # zizmor: ignore[github-env] FLATE_TOOL_DIR is composed of controlled inputs and runner-provided paths; adding to PATH is the action's contract
        set -euo pipefail

        OS=$(echo "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')
        if [[ "${OS}" == "macos" ]]; then
          OS="darwin"
        fi

        ARCH=$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')
        case "${ARCH}" in
          x64|x86_64) ARCH="amd64" ;;
          aarch64) ARCH="arm64" ;;
        esac

        EXEC="flate"
        ARCHIVE="flate_${VERSION}_${OS}_${ARCH}.tar.gz"
        if [[ "${OS}" == "windows" ]]; then
          EXEC="flate.exe"
          ARCHIVE="flate_${VERSION}_${OS}_${ARCH}.zip"
        fi

        if [[ -z "${FLATE_TOOL_DIR}" ]]; then
          FLATE_TOOL_DIR="${RUNNER_TOOL_CACHE}/flate/${VERSION}/${OS}/${ARCH}"
        fi

        if [[ ! -x "${FLATE_TOOL_DIR}/${EXEC}" ]]; then
          DL_DIR="$(mktemp -dt flate-XXXXXX)"
          trap 'rm -rf "${DL_DIR}"' EXIT

          BASE_URL="https://github.com/home-operations/flate/releases/download/${VERSION}"

          max_retries=5
          retry_delay=5
          download() {
            local url=$1 dest=$2 attempt
            for attempt in $(seq 1 ${max_retries}); do
              echo "Downloading ${url} (attempt ${attempt}/${max_retries})"
              if curl -fsSL -o "${dest}" "${url}"; then
                return 0
              fi
              if [[ ${attempt} -lt ${max_retries} ]]; then
                sleep ${retry_delay}
              fi
            done
            echo "Failed to download ${url} after ${max_retries} attempts"
            return 1
          }

          download "${BASE_URL}/${ARCHIVE}" "${DL_DIR}/${ARCHIVE}"
          download "${BASE_URL}/${ARCHIVE}.sha256" "${DL_DIR}/${ARCHIVE}.sha256"

          echo "Verifying checksum"
          if command -v sha256sum > /dev/null; then
            sum=$(sha256sum "${DL_DIR}/${ARCHIVE}" | awk '{print $1}')
          elif command -v openssl > /dev/null; then
            sum=$(openssl sha256 "${DL_DIR}/${ARCHIVE}" | awk '{print $2}')
          else
            echo "Neither sha256sum nor openssl found"
            exit 1
          fi
          expected=$(awk '{print $1}' "${DL_DIR}/${ARCHIVE}.sha256")
          if [[ "${sum}" != "${expected}" ]]; then
            echo "Checksum mismatch for ${ARCHIVE}: got ${sum}, expected ${expected}"
            exit 1
          fi

          echo "Installing flate to ${FLATE_TOOL_DIR}"
          mkdir -p "${FLATE_TOOL_DIR}"
          if [[ "${OS}" == "windows" ]]; then
            unzip -q "${DL_DIR}/${ARCHIVE}" "${EXEC}" -d "${FLATE_TOOL_DIR}"
          else
            tar xzf "${DL_DIR}/${ARCHIVE}" -C "${FLATE_TOOL_DIR}" "${EXEC}"
          fi
          chmod +x "${FLATE_TOOL_DIR}/${EXEC}"
        fi

        echo "${FLATE_TOOL_DIR}" >> "${GITHUB_PATH}"

    - id: verify
      name: Verify flate
      shell: bash
      run: |-
        set -euo pipefail
        version=$(flate --version | awk '{print $NF}')
        echo "version=${version}" >> "${GITHUB_OUTPUT}"
